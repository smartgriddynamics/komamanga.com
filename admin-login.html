<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komamanga | Admin Login</title>
     <link rel="icon" href="logo-komamanga.png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    
    <style>
        /* YOUR EXACT STYLE - Same as index.html */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a1928 0%, #1a3a5f 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Custom cursor */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.1s ease;
            transform: translate(-50%, -50%);
            backdrop-filter: blur(2px);
        }

        .cursor-follower {
            width: 40px;
            height: 40px;
            background: rgba(79, 159, 255, 0.2);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
            backdrop-filter: blur(4px);
        }

        /* Animated background shapes */
        .shape {
            position: fixed;
            background: rgba(79, 159, 255, 0.1);
            filter: blur(60px);
            border-radius: 50%;
            z-index: -1;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            background: linear-gradient(45deg, #4f9fff, #a45eff);
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            bottom: -200px;
            right: -100px;
            background: linear-gradient(135deg, #00d4ff, #4f9fff);
        }

        .shape-3 {
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, #ff6b6b, #ffd93d);
            opacity: 0.05;
            animation: pulse 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.05; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.1; }
        }

        /* Login Container - Glassmorphism style */
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 4rem 3rem;
            width: 90%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 3rem 1.5rem;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #4f9fff, #a45eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }

        .logo span {
            font-size: 1rem;
            display: block;
            background: linear-gradient(135deg, #4f9fff, #a45eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0.5rem;
        }

        /* Title */
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: white;
            position: relative;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #4f9fff, #a45eff);
            border-radius: 3px;
        }

        /* Input groups */
        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #4f9fff;
            font-size: 1.2rem;
        }

        .input-group input {
            width: 100%;
            padding: 1.2rem 1.2rem 1.2rem 3rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4f9fff;
            box-shadow: 0 0 20px rgba(79, 159, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Login button */
        .login-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #4f9fff, #a45eff);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 1rem;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(79, 159, 255, 0.4);
        }

        /* Error message */
        .error-message {
            color: #e74c3c;
            margin-bottom: 1rem;
            text-align: center;
            padding: 0.5rem;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 10px;
            font-size: 0.9rem;
        }

        /* Back link */
        .back-link {
            text-align: center;
            margin-top: 2rem;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .back-link a:hover {
            color: #4f9fff;
        }

        .back-link a i {
            margin-right: 0.5rem;
        }

        /* Secret note */
        .secret-note {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 1.5rem;
        }

        /* Loading state */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a1928;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #4f9fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Water drop effect */
        .water-drop {
            position: absolute;
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #4f9fff, #a45eff);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            bottom: -50px;
            left: -50px;
            opacity: 0.1;
            animation: dropFloat 6s ease-in-out infinite;
        }

        @keyframes dropFloat {
            0%, 100% { transform: rotate(-45deg) translateY(0); }
            50% { transform: rotate(-45deg) translateY(-20px); }
        }
    </style>
</head>
<body>
    <!-- Loading animation -->
    <div class="loading" id="loading">
        <div class="loader"></div>
    </div>

    <!-- Custom cursor -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <!-- Animated background shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <!-- Decorative water drop -->
    <div class="water-drop"></div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="logo">
            KOMAMANGA
            <span>Admin Portal</span>
        </div>

        <h1>Admin Login</h1>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Admin Email" autocomplete="off">
        </div>
        
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password">
        </div>
        
        <button class="login-btn" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> Login as Admin
        </button>
        
        <div class="back-link">
            <a href="index.html">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
        
        <div class="secret-note">
            <i class="fas fa-shield-alt"></i> Secure Admin Access Only
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBVPL8RsRWWUHI4cenvmZ6HgIe4BEob9fM",
            authDomain: "komamanga.firebaseapp.com",
            projectId: "komamanga",
            databaseURL: "https://komamanga-default-rtdb.firebaseio.com",
            storageBucket: "komamanga.firebasestorage.app",
            messagingSenderId: "909091747954",
            appId: "1:909091747954:web:c8fa5a8af2d89e48e0aaeb"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Loading animation
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
        });

        // Custom cursor
        const cursor = document.getElementById('cursor');
        const cursorFollower = document.getElementById('cursorFollower');

        document.addEventListener('mousemove', function(e) {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorFollower.style.left = e.clientX + 'px';
            cursorFollower.style.top = e.clientY + 'px';
        });

        // Cursor hover effect on button
        const loginBtn = document.querySelector('.login-btn');
        loginBtn.addEventListener('mouseenter', () => {
            cursor.style.width = '30px';
            cursor.style.height = '30px';
            cursor.style.borderColor = '#4f9fff';
            cursorFollower.style.width = '50px';
            cursorFollower.style.height = '50px';
        });
        
        loginBtn.addEventListener('mouseleave', () => {
            cursor.style.width = '20px';
            cursor.style.height = '20px';
            cursor.style.borderColor = 'rgba(255,255,255,0.5)';
            cursorFollower.style.width = '40px';
            cursorFollower.style.height = '40px';
        });

        // Admin login function
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.textContent = '';
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter both email and password';
                return;
            }
            
            try {
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
                
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                
                // Check if user is admin
                const snapshot = await database.ref('admins/' + userCredential.user.uid).once('value');
                
                if (!snapshot.exists()) {
                    await auth.signOut();
                    errorDiv.textContent = 'Access denied. Not an admin account.';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login as Admin';
                    return;
                }
                
                window.location.href = 'admin-dashboard.html';
                
            } catch (error) {
                switch(error.code) {
                    case 'auth/user-not-found':
                        errorDiv.textContent = 'No admin account found with this email';
                        break;
                    case 'auth/wrong-password':
                        errorDiv.textContent = 'Incorrect password';
                        break;
                    case 'auth/invalid-email':
                        errorDiv.textContent = 'Invalid email format';
                        break;
                    case 'auth/too-many-requests':
                        errorDiv.textContent = 'Too many failed attempts. Try again later';
                        break;
                    default:
                        errorDiv.textContent = error.message;
                }
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login as Admin';
            }
        }

        // Handle Enter key
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        // Focus on email input
        document.getElementById('email').focus();
    </script>
</body>
</html>
